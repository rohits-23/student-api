name: CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "tests/**"
      - "run.py"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/**"
      - ".flake8"

  pull_request:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "tests/**"
      - "run.py"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/**"
      - ".flake8"

  workflow_dispatch:
    inputs:
      push_image:
        description: "Push Docker image to DockerHub after build"
        required: false
        default: "true"
        type: boolean

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: "student-api"

jobs:

  # Stage 1: Build API
  build:
    name: Build API
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: pip install -r requirements.txt

  # Stage 2: Run Tests
  test:
    name: Run Tests
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: pip install -r requirements.txt

      - name: Run unit tests
        shell: pwsh
        env:
          FLASK_ENV: "testing"
          TEST_DATABASE_URL: "sqlite:///:memory:"
        run: pytest tests/ -v

  # Stage 3: Code Linting
  lint:
    name: Code Linting
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: pip install -r requirements.txt

      - name: Run flake8 linting
        shell: pwsh
        run: flake8 app/ tests/ run.py

  # Stage 4 and 5: Docker Login, Build and Push
  docker:
    name: Docker Build and Push
    runs-on: self-hosted
    needs:
      - test
      - lint
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.push_image == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        shell: pwsh
        run: |
          $VERSION = (Get-Content VERSION -Raw).Trim()
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT

      - name: Docker login to DockerHub
        shell: pwsh
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        shell: pwsh
        run: |
          docker build -t "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}" .

      - name: Push Docker image to DockerHub
        shell: pwsh
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}"

      - name: Docker logout
        if: always()
        shell: pwsh
        run: docker logout
