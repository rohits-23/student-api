version: '3.9'

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: student-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-student}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-student_password}
      POSTGRES_DB:       ${DB_NAME:-students_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-student} -d ${DB_NAME:-students_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - student-net

  # ── REST API ───────────────────────────────────────────────────────────────
  api:
    image: ${IMAGE_NAME:-student-api}:${VERSION:-1.0.0}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-api
    restart: unless-stopped
    environment:
      # Connection is built from individual DB vars so DATABASE_URL in .env
      # does not need to be changed when switching between local and compose.
      DATABASE_URL:      "postgresql://${DB_USER:-student}:${DB_PASSWORD:-student_password}@db:5432/${DB_NAME:-students_db}"
      SECRET_KEY:        ${SECRET_KEY:-change-me-in-production}
      FLASK_ENV:         ${FLASK_ENV:-production}
      FLASK_HOST:        "0.0.0.0"
      FLASK_PORT:        "5000"
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
      GUNICORN_WORKERS:  ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS:  ${GUNICORN_THREADS:-2}
    ports:
      - "${FLASK_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy   # waits until postgres reports healthy
    networks:
      - student-net

volumes:
  postgres_data:

networks:
  student-net:
    driver: bridge
